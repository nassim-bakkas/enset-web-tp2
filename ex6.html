<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex6 — Variables CSS et thèmes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header a {
      color: #7c83ff;
      text-decoration: none;
      font-size: 0.85rem;
    }

    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    section {
      background: #fff;
      border: 1px solid #ddd;
      padding: 1.5rem;
    }

    h2 {
      font-size: 1.1rem;
      color: #1a1a2e;
      border-left: 4px solid #1a1a2e;
      padding-left: 0.7rem;
      margin-bottom: 1.2rem;
    }


    :root {
      --bg-color: #ffffff;
      --text-color: #222222;
      --primary-color: #1a1a2e;
      --accent-color: #7c83ff;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --text-color: #e0e0e0;
      --primary-color: #7c83ff;
      --accent-color: #c8d0ff;
    }

    body {
      background: var(--bg-color);
      color: var(--text-color);
    }

    .theme-toggle {
      padding: 0.8rem 1.5rem;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body data-theme="light">

  <header>
    <a href="index.html">← Retour</a>
    <h1>Exercice 6 — Variables CSS et thèmes</h1>
  </header>

  <main>
    <section>
      <h2>6.1 Système de couleurs</h2>
      <p>Créez un système de variables CSS pour un thème clair et sombre :</p>
      
      <button class="theme-toggle" onclick="document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'">
        Changer de thème (Clair / Sombre)
      </button>
    </section>
  </main>

</body>
</html>
