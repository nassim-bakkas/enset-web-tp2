<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex7 — Transitions et animations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header a {
      color: #7c83ff;
      text-decoration: none;
      font-size: 0.85rem;
    }

    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    section {
      background: #fff;
      border: 1px solid #ddd;
      padding: 1.5rem;
    }

    h2 {
      font-size: 1.1rem;
      color: #1a1a2e;
      border-left: 4px solid #1a1a2e;
      padding-left: 0.7rem;
      margin-bottom: 1.2rem;
    }

    .btn {
      padding: 12px 24px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #7c83ff;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #7c83ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← Retour</a>
    <h1>Exercice 7 — Transitions et animations</h1>
  </header>

  <main>
    <section>
      <h2>7.1 Bouton animé</h2>
      <p>Créez un bouton avec des transitions au survol :</p>
      <button class="btn">Survolez-moi</button>
    </section>

    <section>
      <h2>7.2 Animation de chargement</h2>
      <p>Créez un spinner de chargement avec @keyframes :</p>
      <div class="spinner"></div>
    </section>
  </main>

</body>
</html>
